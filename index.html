<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ 精美视频播放器</title>
    <style>
        :root {
            --bg: #0a0a12;
            --surface: #151520;
            --surface-light: #1c1c2a;
            --surface-hover: #222236;
            --gold: #e2a845;
            --gold-light: #f0c860;
            --gold-dark: #b8802a;
            --accent: #5b8def;
            --text: #e2e2ec;
            --text-secondary: #9898b0;
            --text-muted: #6a6a80;
            --border: #252538;
            --border-active: #3a3a55;
            --progress-bg: #2a2a3c;
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 0 40px rgba(226, 168, 69, 0.12);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.4);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 20%, #181830 0%, #0a0a12 60%),
                radial-gradient(ellipse at 70% 60%, #1a1420 0%, #0a0a12 50%);
            background-attachment: fixed;
        }

        /* ============ 主容器 ============ */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 1500px;
            max-height: 900px;
            display: flex;
            gap: 0;
            padding: clamp(8px, 1.5vw, 20px);
            box-sizing: border-box;
            position: relative;
        }

        /* ============ 侧边栏 ============ */
        .sidebar {
            width: 330px;
            min-width: 330px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            transition: all var(--transition-smooth);
        }

        .sidebar-header {
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(26, 26, 40, 0.98) 0%, rgba(21, 21, 32, 0.95) 100%);
            backdrop-filter: blur(10px);
        }

        .sidebar-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .sidebar-header .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(226, 168, 69, 0.3);
            flex-shrink: 0;
        }
        .sidebar-header .logo-text {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .sidebar-header .logo-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: -1px;
        }

        .sidebar-list-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .sidebar-list-wrap::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-list-wrap::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-list-wrap::-webkit-scrollbar-thumb {
            background: var(--border-active);
            border-radius: 10px;
        }
        .sidebar-list-wrap::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 列表项 */
        .video-item {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 12px 14px;
            margin: 2px 0;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            border: 1.5px solid transparent;
            background: transparent;
            min-height: 60px;
        }
        .video-item:hover {
            background: var(--surface-hover);
            border-color: var(--border-active);
            transform: translateX(2px);
        }
        .video-item:active {
            transform: scale(0.985);
            transition: transform 0.1s;
        }
        .video-item.active {
            background: var(--surface-hover);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(226, 168, 69, 0.1), inset 0 0 0 1px rgba(226, 168, 69, 0.15);
            transform: translateX(0);
        }
        .video-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            border-radius: 0 4px 4px 0;
            background: var(--gold);
            box-shadow: 0 0 10px rgba(226, 168, 69, 0.5);
        }
        .video-item .thumb-placeholder {
            width: 52px;
            height: 34px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            transition: all var(--transition-fast);
        }
        .video-item.active .thumb-placeholder {
            box-shadow: 0 0 18px rgba(226, 168, 69, 0.35);
            transform: scale(1.04);
        }
        .thumb-placeholder.bg-1 {
            background: linear-gradient(135deg, #3a2a10, #5a3a18);
        }
        .thumb-placeholder.bg-2 {
            background: linear-gradient(135deg, #1a2a3a, #1a3a5a);
        }
        .thumb-placeholder.bg-3 {
            background: linear-gradient(135deg, #2a1a2a, #4a1a4a);
        }
        .thumb-placeholder.bg-4 {
            background: linear-gradient(135deg, #1a2a20, #1a4a30);
        }
        .thumb-placeholder.bg-5 {
            background: linear-gradient(135deg, #2a1a1a, #4a2020);
        }
        .video-item .item-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .video-item .item-index {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color var(--transition-fast);
        }
        .video-item.active .item-index {
            color: var(--gold-light);
        }
        .video-item .item-title {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
            transition: color var(--transition-fast);
        }
        .video-item.active .item-title {
            color: #fff;
        }
        .video-item .now-playing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
            animation: pulse-dot 1.4s ease-in-out infinite;
            display: none;
            box-shadow: 0 0 8px rgba(226, 168, 69, 0.7);
        }
        .video-item.active .now-playing-dot {
            display: block;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        /* ============ 主播放器区域 ============ */
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 16px;
            min-width: 0;
            height: 100%;
            gap: 10px;
        }

        .player-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg), var(--shadow-gold);
            border: 1px solid var(--border);
            min-height: 300px;
            cursor: pointer;
        }

        /* 视频容器 */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 200px;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            outline: none;
        }

        /* 中央大播放按钮 */
        .center-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(226, 168, 69, 0.9);
            border: none;
            cursor: pointer;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-spring);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 50px rgba(226, 168, 69, 0.35);
            pointer-events: auto;
            opacity: 1;
            backdrop-filter: blur(6px);
        }
        .center-play-btn:hover {
            transform: translate(-50%, -50%) scale(1.08);
            background: rgba(240, 200, 96, 0.95);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55), 0 0 60px rgba(226, 168, 69, 0.5);
        }
        .center-play-btn:active {
            transform: translate(-50%, -50%) scale(0.93);
            transition: transform 0.1s;
        }
        .center-play-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            margin-left: 4px;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3));
        }
        .center-play-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.7);
        }

        /* 视频结束overlay */
        .video-end-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 14;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            backdrop-filter: blur(4px);
        }
        .video-end-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .end-btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all var(--transition-fast);
            backdrop-filter: blur(10px);
            font-family: var(--font-sans);
        }
        .end-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .end-btn.primary {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1a12;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(226, 168, 69, 0.35);
        }
        .end-btn.primary:hover {
            background: var(--gold-light);
            box-shadow: 0 10px 30px rgba(226, 168, 69, 0.5);
        }

        /* 错误提示 */
        .error-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 18, 0.92);
            z-index: 16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        .error-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .error-overlay .error-icon {
            font-size: 48px;
            margin-bottom: 6px;
        }

        /* 加载动画 */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            z-index: 12;
            animation: spin 0.8s linear infinite;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .loading-spinner.visible {
            opacity: 1;
        }
        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* 底部控件栏 */
        .controls-bar {
            flex-shrink: 0;
            background: linear-gradient(0deg, rgba(16, 16, 26, 0.97) 0%, rgba(20, 20, 34, 0.9) 100%);
            padding: 8px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 20;
            transition: opacity var(--transition-smooth), transform var(--transition-smooth);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
        }
        .controls-bar.auto-hide {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
        .player-wrapper.paused .controls-bar.auto-hide {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 进度条行 */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 0;
            height: 22px;
            position: relative;
            cursor: pointer;
            padding: 6px 0;
            flex-shrink: 0;
        }
        .progress-track {
            flex: 1;
            height: 5px;
            background: var(--progress-bg);
            border-radius: 10px;
            position: relative;
            overflow: visible;
            cursor: pointer;
            transition: height var(--transition-fast);
        }
        .progress-row:hover .progress-track {
            height: 7px;
        }
        .progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            z-index: 1;
            transition: width 0.3s;
        }
        .progress-filled {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
            border-radius: 10px;
            z-index: 2;
            transition: width 0.08s linear;
            box-shadow: 0 0 10px rgba(226, 168, 69, 0.4);
        }
        .progress-thumb {
            position: absolute;
            top: 50%;
            z-index: 3;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #fff;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity var(--transition-fast), left 0.05s linear;
            pointer-events: none;
        }
        .progress-row:hover .progress-thumb,
        .progress-row.scrubbing .progress-thumb {
            opacity: 1;
        }
        .progress-row.scrubbing .progress-track {
            height: 7px;
        }
        .time-display {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-left: 12px;
            min-width: 90px;
            text-align: right;
            white-space: nowrap;
        }

        /* 按钮行 */
        .buttons-row {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .ctrl-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            color: var(--text);
            flex-shrink: 0;
            position: relative;
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .ctrl-btn:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }
        .ctrl-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: fill var(--transition-fast);
        }
        .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.06);
        }
        .ctrl-btn.play-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }
        .ctrl-btn.play-btn svg {
            width: 22px;
            height: 22px;
        }
        .spacer {
            flex: 1;
        }
        .volume-group {
            display: flex;
            align-items: center;
            gap: 2px;
            position: relative;
        }
        .volume-slider-wrap {
            width: 0;
            overflow: hidden;
            transition: width var(--transition-smooth);
            display: flex;
            align-items: center;
        }
        .volume-group:hover .volume-slider-wrap,
        .volume-group.touching .volume-slider-wrap {
            width: 70px;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 4px;
            border-radius: 10px;
            background: var(--progress-bg);
            outline: none;
            cursor: pointer;
            margin: 0 4px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .volume-slider::-moz-range-thumb {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .current-video-title-bar {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            flex-shrink: 1;
            margin-left: 4px;
        }

        /* ============ 响应式 - 移动端 ============ */
        @media (max-width: 900px) {
            body {
                align-items: stretch;
            }
            .app-container {
                flex-direction: column;
                padding: 6px;
                gap: 6px;
                max-height: none;
                max-width: none;
                height: 100%;
                border-radius: 0;
            }
            .sidebar {
                width: 100%;
                min-width: auto;
                flex-shrink: 1;
                height: auto;
                max-height: 170px;
                flex-direction: column;
                border-radius: var(--radius-md);
                order: 2;
            }
            .sidebar-header {
                padding: 10px 14px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .sidebar-header .logo {
                margin-bottom: 0;
            }
            .sidebar-header .logo-icon {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .sidebar-header .logo-text {
                font-size: 14px;
            }
            .sidebar-header .logo-subtitle {
                display: none;
            }
            .sidebar-list-wrap {
                flex: 1;
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 6px 8px;
                gap: 8px;
                scroll-snap-type: x proximity;
                -webkit-overflow-scrolling: touch;
                white-space: nowrap;
            }
            .sidebar-list-wrap::-webkit-scrollbar {
                height: 3px;
            }
            .video-item {
                flex-shrink: 0;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 10px 12px;
                min-width: 80px;
                min-height: auto;
                border-radius: var(--radius-sm);
                scroll-snap-align: start;
                margin: 0;
            }
            .video-item .thumb-placeholder {
                width: 44px;
                height: 28px;
                font-size: 15px;
                border-radius: 5px;
            }
            .video-item .item-info {
                align-items: center;
                text-align: center;
            }
            .video-item .item-index {
                font-size: 9px;
            }
            .video-item .item-title {
                font-size: 11px;
                max-width: 70px;
            }
            .video-item .now-playing-dot {
                position: absolute;
                top: 6px;
                right: 6px;
                width: 5px;
                height: 5px;
            }
            .video-item.active::before {
                display: none;
            }
            .video-item.active {
                border-color: var(--gold);
                box-shadow: 0 0 14px rgba(226, 168, 69, 0.15);
                transform: translateY(-2px);
            }
            .player-area {
                margin-left: 0;
                flex: 1;
                min-height: 0;
                order: 1;
                gap: 0;
            }
            .player-wrapper {
                border-radius: var(--radius-md);
                min-height: 220px;
            }
            .center-play-btn {
                width: 56px;
                height: 56px;
            }
            .center-play-btn svg {
                width: 22px;
                height: 22px;
            }
            .controls-bar {
                padding: 6px 10px 10px;
                gap: 4px;
            }
            .ctrl-btn {
                width: 32px;
                height: 32px;
            }
            .ctrl-btn svg {
                width: 17px;
                height: 17px;
            }
            .ctrl-btn.play-btn {
                width: 38px;
                height: 38px;
            }
            .ctrl-btn.play-btn svg {
                width: 19px;
                height: 19px;
            }
            .volume-group:hover .volume-slider-wrap,
            .volume-group.touching .volume-slider-wrap {
                width: 50px;
            }
            .volume-slider {
                width: 42px;
            }
            .current-video-title-bar {
                display: none;
            }
            .time-display {
                font-size: 10px;
                min-width: 75px;
                margin-left: 6px;
            }
        }

        @media (max-width: 400px) {
            .sidebar {
                max-height: 140px;
            }
            .video-item {
                min-width: 65px;
                padding: 8px 9px;
            }
            .video-item .thumb-placeholder {
                width: 36px;
                height: 22px;
                font-size: 12px;
            }
            .video-item .item-title {
                font-size: 10px;
                max-width: 55px;
            }
            .video-item .item-index {
                font-size: 8px;
            }
            .center-play-btn {
                width: 46px;
                height: 46px;
            }
            .center-play-btn svg {
                width: 18px;
                height: 18px;
            }
            .ctrl-btn {
                width: 28px;
                height: 28px;
            }
            .ctrl-btn svg {
                width: 15px;
                height: 15px;
            }
            .ctrl-btn.play-btn {
                width: 34px;
                height: 34px;
            }
            .ctrl-btn.play-btn svg {
                width: 17px;
                height: 17px;
            }
            .controls-bar {
                padding: 4px 6px 8px;
            }
        }

        /* 横屏手机优化 */
        @media (max-width: 900px) and (orientation: landscape) {
            .app-container {
                flex-direction: row;
            }
            .sidebar {
                width: 150px;
                min-width: 150px;
                max-height: none;
                height: 100%;
                order: 1;
                border-radius: var(--radius-md);
            }
            .sidebar-list-wrap {
                flex-direction: column;
                overflow-x: hidden;
                overflow-y: auto;
                padding: 4px;
                gap: 2px;
            }
            .video-item {
                flex-direction: row;
                min-width: auto;
                padding: 8px 10px;
                gap: 8px;
            }
            .video-item .thumb-placeholder {
                width: 36px;
                height: 22px;
                font-size: 12px;
            }
            .video-item .item-info {
                align-items: flex-start;
                text-align: left;
            }
            .video-item .item-title {
                font-size: 11px;
                max-width: none;
            }
            .player-area {
                order: 2;
                flex: 1;
                margin-left: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ========== 侧边栏：视频列表 ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">▶</div>
                    <div>
                        <div class="logo-text">视频播放器</div>
                        <div class="logo-subtitle">Video Player</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-list-wrap" id="videoList">
                <!-- JS动态生成 -->
            </div>
        </aside>

        <!-- ========== 主播放器区域 ========== -->
        <main class="player-area">
            <div class="player-wrapper paused" id="playerWrapper">
                <div class="video-container" id="videoContainer">
                    <video
                    id="mainVideo"
                    src="1.mp4"
                    playsinline
                    webkit-playsinline
                    x5-video-player-type="h5"
                    x5-video-orientation="portraint"
                    preload="metadata"
                ></video>
                <!-- 加载动画 -->
                <div class="loading-spinner" id="loadingSpinner"></div>
                <!-- 中央播放按钮 -->
                <button class="center-play-btn" id="centerPlayBtn" aria-label="播放">
                    <svg viewBox="0 0 24 24"><polygon points="5,2 20,12 5,22"/></svg>
            </button>
            <!-- 视频结束overlay -->
            <div class="video-end-overlay" id="endOverlay">
                <button class="end-btn primary" id="btnReplay">🔄 重新播放</button>
                <button class="end-btn" id="btnNextFromEnd">⏭ 下一个视频</button>
            </div>
            <!-- 错误提示 -->
            <div class="error-overlay" id="errorOverlay">
                <span class="error-icon">⚠️</span>
                <span>视频加载失败</span>
                <span style="font-size:11px;color:#888;">请检查文件是否存在</span>
            </div>
        </div>

        <!-- 底部控件栏 -->
        <div class="controls-bar" id="controlsBar">
            <!-- 进度条 -->
            <div class="progress-row" id="progressRow">
                <div class="progress-track" id="progressTrack">
                    <div class="progress-buffered" id="progressBuffered"></div>
                    <div class="progress-filled" id="progressFilled"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
            </div>
            <!-- 按钮行 -->
            <div class="buttons-row">
                <button class="ctrl-btn" id="btnPrev" aria-label="上一个" title="上一个视频">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn play-btn" id="btnPlay" aria-label="播放/暂停">
                    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5,2 20,12 5,22"/></svg>
                    <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
                </button>
                <button class="ctrl-btn" id="btnNext" aria-label="下一个" title="下一个视频">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <span class="current-video-title-bar" id="currentVideoTitleBar">视频一 · 华为牛逼</span>
                <span class="spacer"></span>
                <div class="volume-group" id="volumeGroup">
                    <button class="ctrl-btn" id="btnMute" aria-label="静音" title="静音/取消静音">
                        <svg id="iconVolumeOn" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                        <svg id="iconVolumeOff" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <div class="volume-slider-wrap">
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="音量">
                    </div>
                </div>
                <button class="ctrl-btn" id="btnFullscreen" aria-label="全屏" title="全屏">
                    <svg id="iconFullscreen" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg id="iconFullscreenExit" viewBox="0 0 24 24" style="display:none;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                </button>
            </div>
        </div>
    </div>
</main>
</div>

<script>
    (function() {
        // ============ 视频数据配置 ============
        const videoData = [
            { id: 1, file: '1.mp4', indexLabel: '视频一', title: '华为牛逼', colorClass: 'bg-1' },
            { id: 2, file: '2.mp4', indexLabel: '视频二', title: '华为牛逼', colorClass: 'bg-2' },
            { id: 3, file: '3.mp4', indexLabel: '视频三', title: '嘎子卖酸奶', colorClass: 'bg-3' },
            { id: 4, file: '4.mp4', indexLabel: '视频四', title: '9178', colorClass: 'bg-4' },
            { id: 5, file: '5.mp4', indexLabel: '视频五', title: '9178', colorClass: 'bg-5' },
            { id: 6, file: '6.mp4', indexLabel: '视频六', title: '91', colorClass: 'bg-1' },
            { id: 7, file: '7.mp4', indexLabel: '视频七', title: '猎奇', colorClass: 'bg-2' },
            { id: 8, file: '8.mp4', indexLabel: '视频八', title: '猎奇', colorClass: 'bg-3' },
            { id: 9, file: '9.mp4', indexLabel: '视频九', title: '华为牛逼', colorClass: 'bg-4' },
            { id: 10, file: '10.mp4', indexLabel: '视频十', title: '91', colorClass: 'bg-5' },
        ];

        // ============ DOM元素引用 ============
        const mainVideo = document.getElementById('mainVideo');
        const videoContainer = document.getElementById('videoContainer');
        const playerWrapper = document.getElementById('playerWrapper');
        const controlsBar = document.getElementById('controlsBar');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const endOverlay = document.getElementById('endOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const progressRow = document.getElementById('progressRow');
        const progressTrack = document.getElementById('progressTrack');
        const progressFilled = document.getElementById('progressFilled');
        const progressBuffered = document.getElementById('progressBuffered');
        const progressThumb = document.getElementById('progressThumb');
        const timeDisplay = document.getElementById('timeDisplay');
        const btnPlay = document.getElementById('btnPlay');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnMute = document.getElementById('btnMute');
        const iconVolumeOn = document.getElementById('iconVolumeOn');
        const iconVolumeOff = document.getElementById('iconVolumeOff');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeGroup = document.getElementById('volumeGroup');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const iconFullscreen = document.getElementById('iconFullscreen');
        const iconFullscreenExit = document.getElementById('iconFullscreenExit');
        const currentVideoTitleBar = document.getElementById('currentVideoTitleBar');
        const videoListContainer = document.getElementById('videoList');
        const btnReplay = document.getElementById('btnReplay');
        const btnNextFromEnd = document.getElementById('btnNextFromEnd');

        // ============ 状态变量 ============
        let currentIndex = 0;
        let isPlaying = false;
        let isSeeking = false;
        let hideControlsTimeout = null;
        let isControlsVisible = true;
        let isFullscreen = false;
        let volumeBeforeMute = 80;
        let hasUserInteracted = false;

        // ============ 初始化视频列表 ============
        function buildVideoList() {
            videoListContainer.innerHTML = '';
            videoData.forEach((v, idx) => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.setAttribute('data-index', idx);
                item.innerHTML = `
                    <div class="thumb-placeholder ${v.colorClass}">${v.id}</div>
                    <div class="item-info">
                        <span class="item-index">${v.indexLabel}</span>
                        <span class="item-title">${v.title}</span>
                    </div>
                    <div class="now-playing-dot"></div>
                `;
                item.addEventListener('click', () => {
                    if (idx === currentIndex) {
                        togglePlay();
                    } else {
                        switchToVideo(idx);
                    }
                });
                videoListContainer.appendChild(item);
            });
            updateActiveItem();
        }

        function updateActiveItem() {
            const items = videoListContainer.querySelectorAll('.video-item');
            items.forEach((item, idx) => {
                if (idx === currentIndex) {
                    item.classList.add('active');
                    // 滚动到可见区域
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    item.classList.remove('active');
                }
            });
            // 更新标题栏
            const v = videoData[currentIndex];
            currentVideoTitleBar.textContent = `${v.indexLabel} · ${v.title}`;
        }

        // ============ 视频切换 ============
        function switchToVideo(index) {
            if (index < 0) index = videoData.length - 1;
            if (index >= videoData.length) index = 0;
            const wasPlaying = isPlaying;
            currentIndex = index;
            const v = videoData[currentIndex];
            // 重置状态
            hideEndOverlay();
            hideErrorOverlay();
            showLoading();
            mainVideo.src = v.file;
            mainVideo.load();
            updateActiveItem();
            updatePlayButton(false);
            centerPlayBtn.classList.remove('hidden');
            playerWrapper.classList.add('paused');
            isPlaying = false;
            // 如果之前在播放，自动播放新视频
            if (wasPlaying) {
                mainVideo.play().then(() => {
                    onPlaySuccess();
                }).catch(() => {
                    // 需要用户交互
                    centerPlayBtn.classList.remove('hidden');
                });
            }
            // 更新标题
            currentVideoTitleBar.textContent = `${v.indexLabel} · ${v.title}`;
            progressFilled.style.width = '0%';
            progressThumb.style.left = '0%';
            progressBuffered.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            document.title = `▶ ${v.indexLabel} · ${v.title}`;
        }

        function nextVideo() {
            const nextIndex = (currentIndex + 1) % videoData.length;
            switchToVideo(nextIndex);
        }
        function prevVideo() {
            const prevIndex = (currentIndex - 1 + videoData.length) % videoData.length;
            switchToVideo(prevIndex);
        }

        // ============ 播放控制 ============
        function togglePlay() {
            if (isPlaying) {
                pauseVideo();
            } else {
                playVideo();
            }
        }

        function playVideo() {
            hideErrorOverlay();
            hideEndOverlay();
            const promise = mainVideo.play();
            if (promise && promise.then) {
                promise.then(() => {
                    onPlaySuccess();
                }).catch((err) => {
                    console.log('播放失败，等待用户交互:', err.message);
                    centerPlayBtn.classList.remove('hidden');
                    isPlaying = false;
                    playerWrapper.classList.add('paused');
                    updatePlayButton(false);
                });
            }
        }

        function onPlaySuccess() {
            isPlaying = true;
            playerWrapper.classList.remove('paused');
            updatePlayButton(true);
            centerPlayBtn.classList.add('hidden');
            hideErrorOverlay();
            hideEndOverlay();
            document.title = `▶ ${videoData[currentIndex].indexLabel} · ${videoData[currentIndex].title}`;
        }

        function pauseVideo() {
            mainVideo.pause();
            isPlaying = false;
            playerWrapper.classList.add('paused');
            updatePlayButton(false);
            centerPlayBtn.classList.remove('hidden');
            showControls();
            document.title = `⏸ ${videoData[currentIndex].indexLabel} · ${videoData[currentIndex].title}`;
        }

        function updatePlayButton(playing) {
            if (playing) {
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            } else {
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        }

        // ============ Overlay管理 ============
        function showLoading() {
            loadingSpinner.classList.add('visible');
        }

        function hideLoading() {
            loadingSpinner.classList.remove('visible');
        }

        function showEndOverlay() {
            endOverlay.classList.add('visible');
            centerPlayBtn.classList.add('hidden');
            showControls();
        }

        function hideEndOverlay() {
            endOverlay.classList.remove('visible');
        }

        function showErrorOverlay() {
            errorOverlay.classList.add('visible');
            hideLoading();
            centerPlayBtn.classList.add('hidden');
            updatePlayButton(false);
            isPlaying = false;
            playerWrapper.classList.add('paused');
        }

        function hideErrorOverlay() {
            errorOverlay.classList.remove('visible');
        }

        // ============ 控件自动隐藏 ============
        function showControls() {
            controlsBar.classList.remove('auto-hide');
            isControlsVisible = true;
            resetHideTimer();
        }

        function hideControlsIfPlaying() {
            if (isPlaying && !isSeeking && !endOverlay.classList.contains('visible')) {
                controlsBar.classList.add('auto-hide');
                isControlsVisible = false;
            }
        }

        function resetHideTimer() {
            if (hideControlsTimeout) clearTimeout(hideControlsTimeout);
            if (isPlaying && !isSeeking) {
                hideControlsTimeout = setTimeout(() => {
                    hideControlsIfPlaying();
                }, 3500);
            }
        }

        function cancelHideTimer() {
            if (hideControlsTimeout) {
                clearTimeout(hideControlsTimeout);
                hideControlsTimeout = null;
            }
        }

        // ============ 进度条更新 ============
        function updateProgress() {
            if (!isSeeking && mainVideo.duration && isFinite(mainVideo.duration)) {
                const percent = (mainVideo.currentTime / mainVideo.duration) * 100;
                progressFilled.style.width = percent + '%';
                progressThumb.style.left = percent + '%';
                timeDisplay.textContent = formatTime(mainVideo.currentTime) + ' / ' + formatTime(
                    mainVideo.duration);
            }
            // 更新缓冲进度
            if (mainVideo.buffered && mainVideo.buffered.length > 0 && mainVideo.duration) {
                const bufferedEnd = mainVideo.buffered.end(mainVideo.buffered.length - 1);
                const buffPercent = (bufferedEnd / mainVideo.duration) * 100;
                progressBuffered.style.width = buffPercent + '%';
            }
        }

        function formatTime(seconds) {
            if (!isFinite(seconds) || seconds < 0) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        // ============ 进度条拖动 ============
        function getProgressFromEvent(e) {
            const rect = progressTrack.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let ratio = (clientX - rect.left) / rect.width;
            ratio = Math.max(0, Math.min(1, ratio));
            return ratio;
        }

        function startSeek(e) {
            isSeeking = true;
            progressRow.classList.add('scrubbing');
            cancelHideTimer();
            showControls();
            const ratio = getProgressFromEvent(e);
            updateSeekUI(ratio);
            e.preventDefault();
        }

        function moveSeek(e) {
            if (!isSeeking) return;
            const ratio = getProgressFromEvent(e);
            updateSeekUI(ratio);
            e.preventDefault();
        }

        function endSeek(e) {
            if (!isSeeking) return;
            isSeeking = false;
            progressRow.classList.remove('scrubbing');
            const ratio = getProgressFromEvent(e);
            if (mainVideo.duration && isFinite(mainVideo.duration)) {
                mainVideo.currentTime = ratio * mainVideo.duration;
            }
            updateSeekUI(ratio);
            resetHideTimer();
            if (isPlaying) {
                hideControlsTimeout = setTimeout(() => hideControlsIfPlaying(), 3500);
            }
        }

        function updateSeekUI(ratio) {
            const percent = ratio * 100;
            progressFilled.style.width = percent + '%';
            progressThumb.style.left = percent + '%';
            if (mainVideo.duration && isFinite(mainVideo.duration)) {
                const seekTime = ratio * mainVideo.duration;
                timeDisplay.textContent = formatTime(seekTime) + ' / ' + formatTime(mainVideo.duration);
            }
        }

        // ============ 音量控制 ============
        function updateVolumeUI(vol) {
            volumeSlider.value = vol;
            mainVideo.volume = vol / 100;
            if (vol === 0) {
                iconVolumeOn.style.display = 'none';
                iconVolumeOff.style.display = 'block';
            } else {
                iconVolumeOn.style.display = 'block';
                iconVolumeOff.style.display = 'none';
            }
        }

        function toggleMute() {
            if (mainVideo.volume > 0.001) {
                volumeBeforeMute = Math.round(mainVideo.volume * 100);
                updateVolumeUI(0);
            } else {
                const restoreVol = volumeBeforeMute > 0 ? volumeBeforeMute : 80;
                updateVolumeUI(restoreVol);
                volumeBeforeMute = restoreVol;
            }
        }

        // ============ 全屏 ============
        function toggleFullscreen() {
            if (!isFullscreen) {
                enterFullscreen();
            } else {
                exitFullscreen();
            }
        }

        function enterFullscreen() {
            const el = playerWrapper;
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(() => pseudoFullscreen(true));
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            } else if (el.msRequestFullscreen) {
                el.msRequestFullscreen();
            } else {
                pseudoFullscreen(true);
            }
        }

        function exitFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            } else {
                pseudoFullscreen(false);
            }
        }

        function pseudoFullscreen(enter) {
            if (enter) {
                playerWrapper.style.position = 'fixed';
                playerWrapper.style.top = '0';
                playerWrapper.style.left = '0';
                playerWrapper.style.width = '100vw';
                playerWrapper.style.height = '100dvh';
                playerWrapper.style.zIndex = '9999';
                playerWrapper.style.borderRadius = '0';
                playerWrapper.style.border = 'none';
                playerWrapper.style.maxHeight = 'none';
                isFullscreen = true;
            } else {
                playerWrapper.style.position = '';
                playerWrapper.style.top = '';
                playerWrapper.style.left = '';
                playerWrapper.style.width = '';
                playerWrapper.style.height = '';
                playerWrapper.style.zIndex = '';
                playerWrapper.style.borderRadius = '';
                playerWrapper.style.border = '';
                playerWrapper.style.maxHeight = '';
                isFullscreen = false;
            }
            updateFullscreenIcon();
        }

        function updateFullscreenIcon() {
            if (isFullscreen) {
                iconFullscreen.style.display = 'none';
                iconFullscreenExit.style.display = 'block';
            } else {
                iconFullscreen.style.display = 'block';
                iconFullscreenExit.style.display = 'none';
            }
        }

        function handleFullscreenChange() {
            const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document
                .msFullscreenElement;
            if (fsEl === playerWrapper) {
                isFullscreen = true;
                playerWrapper.style.borderRadius = '0';
                playerWrapper.style.border = 'none';
                playerWrapper.style.maxHeight = 'none';
            } else if (!fsEl && isFullscreen) {
                // 退出了全屏
                if (playerWrapper.style.position === 'fixed') {
                    // 是伪全屏，不需要处理
                } else {
                    isFullscreen = false;
                    playerWrapper.style.borderRadius = '';
                    playerWrapper.style.border = '';
                    playerWrapper.style.maxHeight = '';
                }
            } else if (!fsEl) {
                isFullscreen = false;
                playerWrapper.style.borderRadius = '';
                playerWrapper.style.border = '';
                playerWrapper.style.maxHeight = '';
            }
            updateFullscreenIcon();
        }

        // ============ 事件绑定 ============
        // 播放/暂停
        btnPlay.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        centerPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            playVideo();
        });
        videoContainer.addEventListener('click', (e) => {
            // 双击全屏
            if (e.detail === 2 && !e.target.closest('button') && !e.target.closest('input')) {
                toggleFullscreen();
                return;
            }
            if (e.detail === 1 && !e.target.closest('button') && !e.target.closest('input') && !e.target
                .closest('.end-btn')) {
                // 单击切换播放/暂停（延迟判断以区分双击）
                if (!isPlaying || endOverlay.classList.contains('visible')) {
                    togglePlay();
                }
                showControls();
            }
        });
        // 单击播放器区域显示控件（用于移动端）
        playerWrapper.addEventListener('click', function(e) {
            if (e.target === playerWrapper || e.target === videoContainer || e.target.closest('.video-container')) {
                if (isControlsVisible && isPlaying && !e.target.closest('button') && !e.target.closest('input') &&
                    e.detail === 1) {
                    // 控件可见且正在播放，单击可能想暂停，交给videoContainer处理
                } else if (!isControlsVisible && e.detail === 1) {
                    showControls();
                }
            }
        });

        btnPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            prevVideo();
        });
        btnNext.addEventListener('click', (e) => {
            e.stopPropagation();
            nextVideo();
        });
        btnMute.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMute();
        });
        btnFullscreen.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFullscreen();
        });
        btnReplay.addEventListener('click', (e) => {
            e.stopPropagation();
            mainVideo.currentTime = 0;
            hideEndOverlay();
            playVideo();
        });
        btnNextFromEnd.addEventListener('click', (e) => {
            e.stopPropagation();
            nextVideo();
        });

        // 音量滑块
        volumeSlider.addEventListener('input', () => {
            const vol = parseInt(volumeSlider.value);
            updateVolumeUI(vol);
            if (vol > 0) volumeBeforeMute = vol;
        });
        volumeSlider.addEventListener('click', (e) => e.stopPropagation());
        // 移动端触摸音量组
        volumeGroup.addEventListener('touchstart', () => {
            volumeGroup.classList.add('touching');
        });
        volumeGroup.addEventListener('touchend', () => {
            setTimeout(() => volumeGroup.classList.remove('touching'), 1500);
        });

        // 进度条事件
        progressTrack.addEventListener('mousedown', startSeek);
        progressTrack.addEventListener('touchstart', startSeek, { passive: false });
        document.addEventListener('mousemove', (e) => {
            if (isSeeking) moveSeek(e);
        });
        document.addEventListener('touchmove', (e) => {
            if (isSeeking) moveSeek(e);
        }, { passive: false });
        document.addEventListener('mouseup', (e) => {
            if (isSeeking) endSeek(e);
        });
        document.addEventListener('touchend', (e) => {
            if (isSeeking) endSeek(e);
        });
        progressRow.addEventListener('click', (e) => {
            if (!isSeeking && e.target !== progressThumb) {
                const ratio = getProgressFromEvent(e);
                if (mainVideo.duration && isFinite(mainVideo.duration)) {
                    mainVideo.currentTime = ratio * mainVideo.duration;
                }
                updateSeekUI(ratio);
            }
        });

        // 视频事件
        mainVideo.addEventListener('loadstart', () => {
            showLoading();
            hideErrorOverlay();
            hideEndOverlay();
        });
        mainVideo.addEventListener('loadedmetadata', () => {
            hideLoading();
            updateProgress();
            // 如果之前正在播放，继续播放
            if (isPlaying && mainVideo.paused) {
                mainVideo.play().catch(() => {
                    pauseVideo();
                });
            }
        });
        mainVideo.addEventListener('canplay', () => {
            hideLoading();
            updateProgress();
        });
        mainVideo.addEventListener('playing', () => {
            hideLoading();
            onPlaySuccess();
            resetHideTimer();
        });
        mainVideo.addEventListener('pause', () => {
            if (!isSeeking && mainVideo.currentTime < (mainVideo.duration || 0) - 0.3) {
                // 正常暂停
                isPlaying = false;
                playerWrapper.classList.add('paused');
                updatePlayButton(false);
                centerPlayBtn.classList.remove('hidden');
                showControls();
                cancelHideTimer();
            }
        });
        mainVideo.addEventListener('ended', () => {
            isPlaying = false;
            playerWrapper.classList.add('paused');
            updatePlayButton(false);
            showEndOverlay();
            showControls();
            cancelHideTimer();
            document.title = `⏹ ${videoData[currentIndex].indexLabel} · ${videoData[currentIndex].title}`;
        });
        mainVideo.addEventListener('timeupdate', updateProgress);
        mainVideo.addEventListener('progress', updateProgress);
        mainVideo.addEventListener('error', () => {
            hideLoading();
            showErrorOverlay();
            isPlaying = false;
            playerWrapper.classList.add('paused');
            updatePlayButton(false);
            cancelHideTimer();
            document.title = `⚠ 视频加载失败`;
        });
        mainVideo.addEventListener('waiting', () => {
            if (isPlaying) showLoading();
        });

        // 鼠标移动显示控件（桌面端）
        playerWrapper.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 900) {
                showControls();
                resetHideTimer();
            }
        });
        playerWrapper.addEventListener('mouseenter', () => {
            if (window.innerWidth > 900) {
                showControls();
                resetHideTimer();
            }
        });
        playerWrapper.addEventListener('mouseleave', () => {
            if (window.innerWidth > 900 && isPlaying) {
                cancelHideTimer();
                hideControlsTimeout = setTimeout(() => hideControlsIfPlaying(), 1500);
            }
        });
        // 移动端触摸显示控件
        playerWrapper.addEventListener('touchstart', (e) => {
            if (window.innerWidth <= 900 && !e.target.closest('button') && !e.target.closest('input') && !e.target
                .closest('.end-btn')) {
                if (!isControlsVisible) {
                    showControls();
                } else if (isPlaying && !e.target.closest('.progress-row')) {
                    // 控件可见时触摸切换显示
                    cancelHideTimer();
                    hideControlsTimeout = setTimeout(() => hideControlsIfPlaying(), 4000);
                }
            }
        }, { passive: true });

        // 全屏变化监听
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('msfullscreenchange', handleFullscreenChange);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 防止在输入框中触发
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'arrowleft':
                    e.preventDefault();
                    if (mainVideo.currentTime) mainVideo.currentTime = Math.max(0, mainVideo.currentTime -
                        5);
                    showControls();
                    resetHideTimer();
                    break;
                case 'arrowright':
                    e.preventDefault();
                    if (mainVideo.duration) mainVideo.currentTime = Math.min(mainVideo.duration, mainVideo
                        .currentTime + 5);
                    showControls();
                    resetHideTimer();
                    break;
                case 'arrowup':
                    e.preventDefault();
                    {
                        const newVol = Math.min(100, Math.round(mainVideo.volume * 100) + 5);
                        updateVolumeUI(newVol);
                        if (newVol > 0) volumeBeforeMute = newVol;
                    }
                    break;
                case 'arrowdown':
                    e.preventDefault();
                    {
                        const newVol = Math.max(0, Math.round(mainVideo.volume * 100) - 5);
                        updateVolumeUI(newVol);
                        if (newVol > 0) volumeBeforeMute = newVol;
                    }
                    break;
                case 'f':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                case 'm':
                    e.preventDefault();
                    toggleMute();
                    break;
                case 'n':
                    e.preventDefault();
                    nextVideo();
                    break;
                case 'p':
                    if (e.ctrlKey || e.metaKey) break; // 不拦截Ctrl+P打印
                    e.preventDefault();
                    prevVideo();
                    break;
            }
        });

        // 窗口大小变化时调整
        window.addEventListener('resize', () => {
            updateProgress();
            if (window.innerWidth > 900 && isControlsVisible === false && !isPlaying) {
                showControls();
            }
        });

        // 页面卸载前保存状态
        window.addEventListener('beforeunload', () => {
            if (isPlaying) {
                mainVideo.pause();
            }
        });

        // 处理移动端点击视频列表后的自动播放
        document.addEventListener('touchstart', function firstTouch() {
            hasUserInteracted = true;
            document.removeEventListener('touchstart', firstTouch);
        }, { once: true });
        document.addEventListener('click', function firstClick() {
            hasUserInteracted = true;
            document.removeEventListener('click', firstClick);
        }, { once: true });

        // ============ 初始化 ============
        function init() {
            buildVideoList();
            updateVolumeUI(80);
            updatePlayButton(false);
            updateFullscreenIcon();
            updateActiveItem();
            currentVideoTitleBar.textContent = `${videoData[0].indexLabel} · ${videoData[0].title}`;
            document.title = `🎬 ${videoData[0].indexLabel} · ${videoData[0].title}`;
            progressFilled.style.width = '0%';
            progressThumb.style.left = '0%';
            progressBuffered.style.width = '0%';
            timeDisplay.textContent = '00:00 / 00:00';
            centerPlayBtn.classList.remove('hidden');
            playerWrapper.classList.add('paused');
            showControls();
            // 预加载元数据
            mainVideo.load();
        }

        init();
        console.log('✅ 精美视频播放器已就绪');
        console.log('   📂 视频源：本地目录 1.mp4 ~ 10.mp4');
        console.log('   ⌨ 快捷键：空格=播放/暂停 | ←→=快进快退 | ↑↓=音量 | F=全屏 | M=静音 | N=下一个 | P=上一个');
        console.log('   📱 响应式：自动适配桌面端和移动端');
    })();
</script>
</body>
</html>
